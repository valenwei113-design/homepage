<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valen Wei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }

    .fade-up {
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.8s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    #music-btn {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 50;
      width: 36px;
      height: 36px;
      border: 1px solid #d6d3d1;
      background: rgba(250,250,249,0.85);
      backdrop-filter: blur(6px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #music-btn:hover { border-color: #a8a29e; background: rgba(250,250,249,0.98); }

    /* Spinning vinyl when playing */
    #music-btn.playing #vinyl {
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Scrolling song title */
    #music-label {
      position: fixed;
      bottom: 30px;
      left: 68px;
      z-index: 50;
      font-size: 11px;
      color: #a8a29e;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
    }
    #music-label.visible { opacity: 1; }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 h-screen flex flex-col overflow-hidden">

  <main class="flex-1 flex overflow-hidden">

    <!-- Left: photo with hover crossfade -->
    <div class="w-5/12 flex-shrink-0 relative overflow-hidden group">
      <img src="home/casual.jpg" alt="Valen"
           class="w-full h-full object-cover object-top transition-opacity duration-700" />
      <img src="home/Lan Wei.jpg" alt="Valen Wei"
           class="absolute inset-0 w-full h-full object-cover object-top opacity-0 group-hover:opacity-100 transition-opacity duration-700"
           style="transform: scale(1.2); transform-origin: center 30%;" />
      <div class="absolute inset-0" style="background: linear-gradient(to right, transparent 70%, #fafaf9);"></div>
    </div>

    <!-- Middle: content -->
    <div class="flex-1 flex flex-col justify-center px-14">
      <p class="fade-up text-xs tracking-widest uppercase text-stone-400 mb-4" style="animation-delay:0.1s;">Hello, I'm</p>
      <h1 class="fade-up text-6xl font-bold text-stone-900 leading-tight mb-6" style="animation-delay:0.2s;">Valen</h1>
      <p class="fade-up text-stone-500 font-light text-base leading-relaxed max-w-sm mb-8" style="animation-delay:0.35s;">
        Writing my story one country at a time.
      </p>
      <p class="fade-up text-stone-400 font-light text-sm italic tracking-wide" style="font-family:'Playfair Display',serif; animation-delay:0.5s;">
        Courage is fear walking.
      </p>
    </div>

    <!-- Right: vertical nav -->
    <div class="fade-up flex flex-col justify-center gap-7 pr-10 pl-4" style="animation-delay:0.4s;">
      <a href="travel.html" class="text-xs text-stone-400 hover:text-stone-800 transition-colors font-light tracking-wide">Traces</a>
      <a href="hobbies.html" class="text-xs text-stone-400 hover:text-stone-800 transition-colors font-light tracking-wide">Discovery</a>
      <a href="dwelling.html" class="text-xs text-stone-400 hover:text-stone-800 transition-colors font-light tracking-wide">Dwelling</a>
      <a href="vlog.html" class="text-xs text-stone-400 hover:text-stone-800 transition-colors font-light tracking-wide">Vlog</a>
      <a href="tips.html" class="text-xs text-stone-400 hover:text-stone-800 transition-colors font-light tracking-wide">Tips</a>
      <a href="calendar.html" class="text-xs text-stone-400 hover:text-stone-800 transition-colors font-light tracking-wide">Calendar</a>
    </div>

  </main>

  <!-- Contact: bottom right -->
  <div class="fade-up fixed bottom-6 right-10 flex gap-6 text-xs font-light text-stone-400" style="animation-delay:0.65s;">
    <a href="mailto:valenwei113@gmail.com" class="hover:text-stone-700 transition-colors">valenwei113@gmail.com</a>
    <a href="https://www.linkedin.com/in/lan-w-73a82b178/" target="_blank" class="hover:text-stone-700 transition-colors">LinkedIn ↗</a>
  </div>

  <!-- Background music -->
  <audio id="bg-music" loop preload="auto">
    <source src="home/Ellie Goulding-How Long Will I Love You.mp3" type="audio/mpeg" />
  </audio>

  <!-- Music button -->
  <button id="music-btn" onclick="toggleMusic()" title="Toggle music">
    <svg id="vinyl" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="8" cy="8" r="7" stroke="#a8a29e" stroke-width="1"/>
      <circle cx="8" cy="8" r="2.5" stroke="#a8a29e" stroke-width="1"/>
      <circle cx="8" cy="8" r="1" fill="#a8a29e"/>
    </svg>
  </button>
  <span id="music-label">How Long Will I Love You — Ellie Goulding</span>

  <script>
    const audio = document.getElementById('bg-music');
    const btn   = document.getElementById('music-btn');
    const label = document.getElementById('music-label');

    audio.volume = 0.35;

    // Try autoplay on load
    window.addEventListener('load', () => {
      audio.play().then(() => {
        btn.classList.add('playing');
        label.classList.add('visible');
        setTimeout(() => label.classList.remove('visible'), 3000);
      }).catch(() => {
        // Autoplay blocked — wait for first interaction
        document.addEventListener('click', () => {
          audio.play();
          btn.classList.add('playing');
        }, { once: true });
      });
    });

    function toggleMusic() {
      if (audio.paused) {
        audio.play();
        btn.classList.add('playing');
        label.classList.add('visible');
        setTimeout(() => label.classList.remove('visible'), 3000);
      } else {
        audio.pause();
        btn.classList.remove('playing');
        label.classList.remove('visible');
      }
    }
  </script>
</body>
</html>
