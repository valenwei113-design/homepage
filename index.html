<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Valen Wei</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500&family=Great+Vibes&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    h1, h2 { font-family: 'Playfair Display', serif; }

    .fade-up {
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 0.8s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Letter-by-letter for title */
    .letter {
      display: inline-block;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    /* Nav link underline hover */
    .nav-link {
      position: relative;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      width: 0;
      height: 1px;
      background: #44403c;
      transition: width 0.3s ease;
    }
    .nav-link:hover::after { width: 100%; }

    /* Blur-clear for quote */
    @keyframes fadeBlur {
      from { opacity: 0; filter: blur(6px); letter-spacing: 0.18em; }
      to   { opacity: 1; filter: blur(0);   letter-spacing: 0.04em; }
    }
    .fade-blur {
      opacity: 0;
      animation: fadeBlur 1.4s cubic-bezier(0.22,1,0.36,1) forwards;
    }

    #music-btn {
      position: fixed;
      bottom: 24px;
      left: 24px;
      z-index: 50;
      width: 36px;
      height: 36px;
      border: 1px solid #d6d3d1;
      background: rgba(250,250,249,0.85);
      backdrop-filter: blur(6px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
    }
    #music-btn:hover { border-color: #a8a29e; background: rgba(250,250,249,0.98); }

    /* Spinning vinyl when playing */
    #music-btn.playing #vinyl {
      animation: spin 3s linear infinite;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    /* Scrolling song title */
    #music-label {
      position: fixed;
      bottom: 30px;
      left: 68px;
      z-index: 50;
      font-size: 11px;
      color: #a8a29e;
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      letter-spacing: 0.04em;
      opacity: 0;
      transition: opacity 0.3s;
      white-space: nowrap;
      pointer-events: none;
    }
    #music-label.visible { opacity: 1; }
  </style>
</head>
<body class="bg-stone-50 text-stone-800 h-screen flex flex-col overflow-hidden">

  <main class="flex-1 flex overflow-hidden">

    <!-- Left: video background -->
    <div class="w-5/12 flex-shrink-0 relative overflow-hidden">
      <video autoplay muted loop playsinline
             style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover; opacity:1;">
        <source src="home/backpack.mov" type="video/mp4" />
      </video>
      <div class="absolute inset-0" style="background: linear-gradient(to right, transparent 70%, #fafaf9);"></div>
    </div>

    <!-- Middle: content -->
    <div class="flex-1 flex flex-col justify-center px-14 relative">

      <h1 class="text-7xl text-stone-900 leading-tight mb-6" id="title" style="font-family:'Great Vibes',cursive;">Valen</h1>

      <div class="flex flex-col gap-6 mb-8 items-center">
        <a href="travel.html"  class="nav-link text-stone-400 hover:text-stone-800 tracking-widest fade-up" style="font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:300;" style="animation-delay:0.55s;">Traces</a>
        <a href="hobbies.html" class="nav-link text-stone-400 hover:text-stone-800 tracking-widest fade-up" style="font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:300;" style="animation-delay:0.62s;">Discovery</a>
        <a href="dwelling.html"class="nav-link text-stone-400 hover:text-stone-800 tracking-widest fade-up" style="font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:300;" style="animation-delay:0.69s;">Dwelling</a>
        <a href="vlog.html"    class="nav-link text-stone-400 hover:text-stone-800 tracking-widest fade-up" style="font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:300;" style="animation-delay:0.76s;">Vlog</a>
        <a href="tips.html"    class="nav-link text-stone-400 hover:text-stone-800 tracking-widest fade-up" style="font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:300;" style="animation-delay:0.83s;">Tips</a>
        <a href="calendar.html"class="nav-link text-stone-400 hover:text-stone-800 tracking-widest fade-up" style="font-family:'Cormorant Garamond',serif; font-size:15px; font-weight:300;" style="animation-delay:0.90s;">Calendar</a>
      </div>
      <p class="fade-blur text-stone-400 whitespace-nowrap text-2xl" style="font-family:'Great Vibes',cursive; animation-delay:1.0s;">Courage is fear walking</p>
      <div class="fade-up flex gap-6 text-xs font-light text-stone-400 justify-center absolute bottom-6 left-0 right-0" style="animation-delay:1.1s;">
        <a href="mailto:valenwei113@gmail.com" class="hover:text-stone-700 transition-colors">valenwei113@gmail.com</a>
        <a href="https://www.linkedin.com/in/lan-w-73a82b178/" target="_blank" class="hover:text-stone-700 transition-colors">LinkedIn ↗</a>
      </div>
    </div>

    <!-- Right: auto slideshow -->
    <div class="w-5/12 flex-shrink-0 relative overflow-hidden" id="slideshow">
      <img src="home/casual.jpg" alt="Valen" id="slide-a"
           class="absolute inset-0 w-full h-full object-cover object-top transition-opacity duration-[1500ms]" style="opacity:1;" />
      <img src="home/Lan Wei.jpg" alt="Valen Wei" id="slide-b"
           class="absolute inset-0 w-full h-full object-cover object-top transition-opacity duration-[1500ms]" style="opacity:0; transform: scale(1.2); transform-origin: center 30%;" />
      <div class="absolute inset-0" style="background: linear-gradient(to left, transparent 70%, #fafaf9); z-index:1;"></div>
    </div>

  </main>


  <!-- Background music -->
  <audio id="bg-music" loop preload="auto">
    <source src="home/Ellie Goulding-How Long Will I Love You.mp3" type="audio/mpeg" />
  </audio>

  <!-- Music button -->
  <button id="music-btn" onclick="toggleMusic()" title="Toggle music">
    <svg id="vinyl" width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="8" cy="8" r="7" stroke="#a8a29e" stroke-width="1"/>
      <circle cx="8" cy="8" r="2.5" stroke="#a8a29e" stroke-width="1"/>
      <circle cx="8" cy="8" r="1" fill="#a8a29e"/>
    </svg>
  </button>
  <span id="music-label">How Long Will I Love You — Ellie Goulding</span>

  <script>
    // Auto slideshow
    const slideA = document.getElementById('slide-a');
    const slideB = document.getElementById('slide-b');
    let showingA = true;
    setInterval(() => {
      showingA = !showingA;
      slideA.style.opacity = showingA ? '1' : '0';
      slideB.style.opacity = showingA ? '0' : '1';
    }, 4000);

    // Letter-by-letter title animation
    const titleEl = document.getElementById('title');
    titleEl.innerHTML = [...titleEl.textContent].map((ch, i) =>
      `<span class="letter" style="animation-delay:${0.15 + i * 0.08}s">${ch}</span>`
    ).join('');

    const audio = document.getElementById('bg-music');
    const btn   = document.getElementById('music-btn');
    const label = document.getElementById('music-label');

    audio.volume = 0.35;

    // Try autoplay on load
    window.addEventListener('load', () => {
      audio.play().then(() => {
        btn.classList.add('playing');
        label.classList.add('visible');
        setTimeout(() => label.classList.remove('visible'), 3000);
      }).catch(() => {
        // Autoplay blocked — wait for first interaction
        document.addEventListener('click', () => {
          audio.play();
          btn.classList.add('playing');
        }, { once: true });
      });
    });

    function toggleMusic() {
      if (audio.paused) {
        audio.play();
        btn.classList.add('playing');
        label.classList.add('visible');
        setTimeout(() => label.classList.remove('visible'), 3000);
      } else {
        audio.pause();
        btn.classList.remove('playing');
        label.classList.remove('visible');
      }
    }
  </script>
</body>
</html>
